name: basic-docker

on: [push]

jobs:
  hello:
    runs-on: ubuntu-latest
    name: hello
    steps:
      - uses: actions/checkout@v4
      - name: saludadno
        run: echo "hola a la clase"
      - uses: actions/checkout@v4

      - name: Run Newman via Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/postman:/etc/newman \
            -v ${{ github.workspace }}/reports:/reports \
            postman/newman \
            run /etc/newman/collection.json \
            -e /etc/newman/environment.dev.json \
            -r cli,htmlextra \
            --reporter-htmlextra-export /reports/report.html

      - name: Install Newman and reporter
        run: |
          npm install -g newman newman-reporter-htmlextra

      - name: Run API tests
        run: |
          newman run postman/postman-collection.json \
            -e postman/environment.dev.json \
            -r cli,htmlextra \
            --reporter-htmlextra-export reports/report.html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: reports/report.html
          retention-days: 7

      - name: Run API tests with env
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
          API_URL: ${{ secrets.API_URL_DEV }}
        run: |
          newman run postman/postman-collection.json \
            -e postman/environment.dev.json \
            --env-var "token=$API_TOKEN" \
            --env-var "baseUrl=$API_URL" \
            -r cli,htmlextra \
            --reporter-htmlextra-export reports/report.html

      - name: Run API tests with data file
        run: |
          newman run postman/postman-collection.json \
            -e postman/environment.dev.json \
            -d postman/data/usuarios.csv \
            -r cli,htmlextra \
            --reporter-htmlextra-export reports/report.html


  despachando:
      runs-on: ubuntu-latest
      name: bye
      needs: hello
      steps: 
        - name: despidiendo
          run: echo "bye bye a la clase"

  
