name: basic-docker

on: [push]

jobs:
  hello:
    runs-on: ubuntu-latest
    name: hello
    steps: 
      - uses: actions/checkout@v4
      - name: saludadno
        run: echo "hola a la clase"
    steps_2:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run API tests
        run: newman run postman/collection.json -e postman/environment.dev.json

      - name: Install Newman and reporter
        run: |
          npm install -g newman newman-reporter-htmlextra

      - name: Run API tests
        run: |
          newman run postman/collection.json \
            -e postman/environment.dev.json \
            -r cli,htmlextra \
            --reporter-htmlextra-export reports/report.html


  despachando:
      runs-on: ubuntu-latest
      name: bye
      needs: hello
      steps: 
        - name: despidiendo
          run: echo "bye bye a la clase"

  
